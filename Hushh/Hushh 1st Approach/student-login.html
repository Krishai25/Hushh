<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Login — Kai Campus Hub</title>
<link rel="stylesheet" href="style.css"/>
<style>
  .auth-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 16px;
  }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px;
    width: 100%; max-width: 420px; animation: fadeUp 0.5s ease;
  }
  .auth-header { margin-bottom: 32px; }
  .auth-header .back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-muted); font-size: 0.85rem; text-decoration: none;
    margin-bottom: 20px; transition: var(--transition);
  }
  .auth-header .back:hover { color: var(--text); }
  .auth-logo { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; color:var(--accent); margin-bottom:8px; }
  .auth-header h2 { font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:800; }
  .auth-header p  { color:var(--text-dim); font-size:.9rem; margin-top:6px; }

  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 44px; }
  .toggle-pw {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.1rem;
  }

  .remember-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; font-size: 0.875rem;
  }
  .remember-row label { display:flex; align-items:center; gap:8px; color:var(--text-dim); cursor:pointer; }
  .remember-row a { color:var(--accent); text-decoration:none; }

  .demo-box {
    background: rgba(108,99,255,0.08); border: 1px dashed rgba(108,99,255,0.3);
    border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 20px;
    font-size: 0.82rem; color: var(--text-dim);
  }
  .demo-box strong { color: var(--accent); }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <a class="back" href="index.html">← Back to home</a>
      <div class="auth-logo">⚡ Kai Campus Hub</div>
      <h2>Welcome back 👋</h2>
      <p>Log in with your college email to continue.</p>
    </div>

    <div id="alert" class="alert"></div>

    <div class="demo-box">
      <strong>Demo:</strong> Any email + password works in offline mode. Try <strong>demo@college.edu</strong>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>College Email</label>
        <input type="email" id="email" placeholder="you@college.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Your password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
        </div>
      </div>
      <div class="remember-row">
        <label><input type="checkbox" id="remember"/> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Log In →</button>
    </form>

    <div class="divider">or</div>
    <p class="text-center" style="font-size:.875rem;color:var(--text-dim)">
      New here? <a href="student-signup.html" class="text-accent">Create an account</a>
    </p>
    <p class="text-center" style="font-size:.875rem;color:var(--text-dim);margin-top:8px">
      Club leader? <a href="club-leader.html" class="text-accent">Leader login →</a>
    </p>
  </div>
</div>

<script src="utils.js"></script>
<script>
function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showAlert(msg, type) {
  const a = document.getElementById('alert');
  a.className = 'alert alert-' + (type === 'error' ? 'error' : 'success') + ' show';
  a.textContent = msg;
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span> Logging in...';
  btn.disabled = true;

  try {
    const res = await apiPost({ action: 'login', email, password });
    if (res.status === 'success') {
      Auth.save(res.data);
      Gamification.updateStreak();
      Gamification.addXP(10);
      await apiPost({ action: 'updateStreak', email, activity: 'login' });
      await n8nTrigger('student_login', { email });
      window.location.href = 'chat.html';
    } else {
      showAlert(res.message || 'Invalid credentials.', 'error');
    }
  } catch (err) {
    // Offline fallback — accept any credentials, save session
    const name = email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, l => l.toUpperCase());
    Auth.save({ name, email, interests: ['Technology','Design'], classYear: '2nd Year' });
    Gamification.updateStreak();
    Gamification.addXP(10);
    showToast('Logged in (offline mode) 🔥', 'success');
    setTimeout(() => window.location.href = 'chat.html', 800);
  } finally {
    btn.innerHTML = 'Log In →';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
