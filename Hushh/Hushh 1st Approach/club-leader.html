<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Club Leader Dashboard — Kai Campus Hub</title>
<link rel="stylesheet" href="style.css"/>
<style>
/* ── ALL STYLING PRESERVED EXACTLY AS PROVIDED ── */
.leader-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.leader-sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; }
.leader-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:var(--accent2); margin-bottom:24px; padding:0 8px; }
.ls-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius-sm); color:var(--text-dim); font-size:0.875rem; cursor:pointer; transition:var(--transition); text-decoration:none; }
.ls-item:hover  { background:var(--surface2); color:var(--text); }
.ls-item.active { background:rgba(255,107,157,0.1); color:var(--accent2); }
.leader-main { padding: 32px; overflow-y: auto; }
.leader-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
.leader-header h1 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; }
#authPanel { max-width: 440px; margin: 80px auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:40px; animation:fadeUp 0.4s ease; }
#authPanel h2 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:8px; }
#authPanel p  { color:var(--text-dim); font-size:.9rem; margin-bottom:24px; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:32px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.stat-card .icon { font-size:1.8rem; margin-bottom:8px; }
.stat-card .val  { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; }
.stat-card .lbl  { font-size:0.8rem; color:var(--text-muted); margin-top:4px; }
.data-table { width:100%; border-collapse:collapse; font-size:0.875rem; }
.data-table th { text-align:left; padding:10px 12px; color:var(--text-muted); font-weight:500; border-bottom:1px solid var(--border); }
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.data-table tr:hover td { background:var(--surface2); }
.form-modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:200; }
.form-modal.open { display:flex; }
.form-modal-inner { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; max-width:500px; width:90%; animation:fadeUp 0.3s ease; position:relative; max-height:90vh; overflow-y:auto; }
.form-modal-inner h3 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:20px; }
.section-tabs { display:flex; gap:4px; margin-bottom:24px; }
.stab { padding:8px 16px; border-radius:8px; font-size:0.875rem; font-weight:500; cursor:pointer; background:none; border:1px solid transparent; color:var(--text-dim); transition:var(--transition); }
.stab.active { background:rgba(255,107,157,0.1); border-color:var(--accent2); color:var(--accent2); }
@media(max-width:700px) { .leader-layout { grid-template-columns:1fr; } .leader-sidebar { display:none; } }

/* Additional layout for split inputs */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<div class="leader-layout">
  <aside class="leader-sidebar">
    <div class="leader-logo">Club Leader</div>
    <div class="ls-item active" onclick="showSection('overview')">Overview</div>
    <div class="ls-item" onclick="showSection('events')">My Events</div>
    <div style="margin-top:auto"></div>
    <div class="ls-item" onclick="leaderLogout()">Logout</div>
  </aside>

  <div class="leader-main">
    <div id="authPanel">
      <h2>Club Leader Portal</h2>
      <p>Sign in to manage your activities.</p>
      <div id="leaderAlert" class="alert"></div>
      <div class="form-group"><label>Email</label><input type="email" id="lEmail" placeholder="leader@college.edu"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="lPassword" placeholder="Password"/></div>
      <button class="btn btn-primary btn-full" onclick="leaderLogin()" style="background:var(--accent2); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%;">Sign In</button>
    </div>

    <div id="dashboard" style="display:none">
      <div class="leader-header">
        <h1>Dashboard</h1>
        <button class="btn btn-primary" style="background:var(--accent2); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;" onclick="openAddEvent()">+ Add Event</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card"><div class="val" id="statEvents">0</div><div class="lbl">Events Posted</div></div>
        <div class="stat-card"><div class="icon">🔗</div><div class="val">Live</div><div class="lbl">Sync Status</div></div>
      </div>

      <div id="secOverview">
        <div class="section-label">Recent Events</div>
        <table class="data-table">
          <thead><tr><th>Event</th><th>Venue</th><th>Date</th><th>Time</th></tr></thead>
          <tbody id="eventsTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="form-modal" id="addEventModal">
  <div class="form-modal-inner">
    <button style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem" onclick="closeEventModal()">✕</button>
    <h3>📅 Create New Event</h3>
    <div id="evAlert" class="alert"></div>
    
    <div class="form-group"><label>Event Title</label><input type="text" id="evTitle" placeholder="e.g. AI Workshop"/></div>
    <div class="form-group"><label>Description</label><textarea id="evDesc" rows="3" style="width: 100%;" placeholder="What is this event about?"></textarea></div>
    
    <div class="row2">
      <div class="form-group"><label>Date</label><input type="date" id="evDate" style="width: 100%;"/></div>
      <div class="form-group"><label>Time</label><input type="time" id="evTime" style="width: 100%;"/></div>
    </div>
    
    <div class="form-group"><label>Venue</label><input type="text" id="evVenue" placeholder="e.g. Lab 204"/></div>
    
    <button class="btn btn-primary btn-full" id="evSubmitBtn" style="background:var(--accent2); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;" onclick="submitEvent()">Publish to Sheets →</button>
  </div>
</div>

<script>
// 🔗 n8n CONFIGURATION
const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook-test/add-event';

let leaderData = { events: [] };

function leaderLogin() {
    const email = document.getElementById('lEmail').value;
    if(!email) return;
    document.getElementById('authPanel').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('statEvents').textContent = leaderData.events.length;
}

function leaderLogout() { location.reload(); }

function openAddEvent() { document.getElementById('addEventModal').classList.add('open'); }
function closeEventModal() { document.getElementById('addEventModal').classList.remove('open'); }

async function submitEvent() {
    const payload = {
        title: document.getElementById('evTitle').value.trim(),
        description: document.getElementById('evDesc').value.trim(),
        date: document.getElementById('evDate').value,
        time: document.getElementById('evTime').value,
        venue: document.getElementById('evVenue').value.trim(),
        timestamp: new Date().toISOString()
    };

    if(!payload.title || !payload.date || !payload.venue) {
        alert("Please fill in Title, Date, and Venue.");
        return;
    }

    const btn = document.getElementById('evSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Syncing...';

    try {
        const response = await fetch(N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            leaderData.events.push(payload);
            renderTable();
            closeEventModal();
            alert("Success! Event synced to Google Sheets.");
        } else {
            alert("Error: n8n returned a status " + response.status);
        }
    } catch (e) {
        alert("Connection error. Check n8n CORS settings.");
    } finally {
        btn.disabled = false;
        btn.textContent = 'Publish to Sheets →';
    }
}

function renderTable() {
    document.getElementById('statEvents').textContent = leaderData.events.length;
    const rows = leaderData.events.map(ev => `
        <tr>
            <td><strong>${ev.title}</strong></td>
            <td>${ev.venue}</td>
            <td>${ev.date}</td>
            <td>${ev.time}</td>
        </tr>
    `).join('');
    document.getElementById('eventsTbody').innerHTML = rows;
}
</script>
</body>
</html>
